services:
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    restart: unless-stopped
    user: "0:0"
    environment:
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-}
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./.jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
