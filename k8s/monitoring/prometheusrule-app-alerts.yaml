apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: my-app-alerts
  namespace: my-app
  labels:
    app.kubernetes.io/part-of: my-app
spec:
  groups:
    - name: my-app.health
      rules:
        - alert: MyAppApiDown
          expr: sum(kube_pod_status_ready{namespace="my-app", pod=~"api-.*", condition="true"}) < 1
          for: 1m
          labels:
            severity: critical
            service: api
          annotations:
            summary: "API pod is not Ready"
            description: "No Ready API pods in namespace my-app for more than 1 minute."

        - alert: MyAppFailedTasksGrowing
          expr: sum(task_lifecycle_status_count{status="failed"}) > 0
          for: 1m
          labels:
            severity: warning
            service: worker
          annotations:
            summary: "Failed tasks detected"
            description: "At least one task is currently in failed status."
