apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-application-lifecycle
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: my-app

data:
  application-lifecycle-k8s.json: |
    {
      "title": "Application Lifecycle (K8s)",
      "uid": "app-lifecycle-k8s",
      "tags": ["my-app", "kubernetes", "lifecycle"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": {
        "from": "now-5m",
        "to": "now"
      },
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "API Ready Pods",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_ready{namespace=\"my-app\",pod=~\"api-.*\",condition=\"true\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {"text": "DOWN"},
                    "1": {"text": "UP"}
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "values": false}
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Tasks Created / min",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(task_lifecycle_api_created_total[$__rate_interval])) * 60"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 5},
                  {"color": "red", "value": 20}
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "values": false}
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Tasks Failed / 5m",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "increase(task_lifecycle_transitions_total{to_status=\"failed\"}[5m])"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "values": false}
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "API 5xx rate",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(task_lifecycle_api_http_requests_total{status_class=\"5xx\"}[$__rate_interval]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.1},
                  {"color": "red", "value": 1}
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "values": false}
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Task Status Distribution",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 4},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (task_lifecycle_status_count)",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 18
              }
            }
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom"}
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "API p95 Latency",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 4},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(task_lifecycle_api_http_request_duration_seconds_bucket[$__rate_interval])))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 16
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.3},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Task Transition Rate by Result",
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 11},
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (to_status, result) (rate(task_lifecycle_transitions_total[$__rate_interval]))",
              "legendFormat": "{{to_status}} ({{result}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "bars",
                "lineWidth": 1,
                "fillOpacity": 70,
                "stacking": {"mode": "normal", "group": "A"}
              }
            }
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right"}
          }
        },
        {
          "id": 8,
          "type": "logs",
          "title": "Live Lifecycle Events (API/Worker)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18},
          "datasource": "Loki",
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"my-app\",container=~\"api|worker\"} |~ \"task_|worker_cycle|worker_started|api_http_request\""
            }
          ],
          "options": {
            "showTime": true,
            "sortOrder": "Descending"
          }
        },
        {
          "id": 9,
          "type": "logs",
          "title": "Critical Errors Stream",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18},
          "datasource": "Loki",
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"my-app\",container=~\"api|worker|gateway\"} |~ \"(?i)error|failed|exception|timeout\""
            }
          ],
          "options": {
            "showTime": true,
            "sortOrder": "Descending"
          }
        }
      ]
    }
