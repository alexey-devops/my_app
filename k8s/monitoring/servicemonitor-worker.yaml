apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: worker
  namespace: my-app
  labels:
    app.kubernetes.io/part-of: my-app
spec:
  namespaceSelector:
    matchNames:
      - my-app
  selector:
    matchLabels:
      app: worker
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
