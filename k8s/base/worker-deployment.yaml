apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: my-app/worker:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9102
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_USER
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: WORKER_METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_METRICS_PORT
            - name: WORKER_DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_DEMO_MODE
            - name: WORKER_AUTOPROCESS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_AUTOPROCESS_ENABLED
            - name: WORKER_PROCESSING_DELAY_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_PROCESSING_DELAY_SECONDS
            - name: WORKER_LOOP_SLEEP_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_LOOP_SLEEP_SECONDS
          livenessProbe:
            exec:
              command: ["python", "healthcheck.py"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["python", "healthcheck.py"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
