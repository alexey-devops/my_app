apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simulator-policy
  namespace: my-app
spec:
  podSelector:
    matchLabels:
      app: simulator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
