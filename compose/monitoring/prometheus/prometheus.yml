global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: nginx_exporter
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: redis_exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:9102']
